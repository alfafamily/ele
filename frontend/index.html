<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link id="favicon" rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Chrome не применяет prefers-color-scheme внутри самого SVG-фавикона —
         подменяем файл фавикона на тёмный вариант через JS по теме ОС, чтобы
         лого было видно на тёмных вкладках браузера. -->
    <script>
      (function () {
        var link = document.getElementById('favicon')
        var mq = window.matchMedia('(prefers-color-scheme: dark)')
        var apply = function () { link.href = mq.matches ? '/favicon-dark.svg' : '/favicon.svg' }
        apply()
        mq.addEventListener('change', apply)
      })()
    </script>
    <link rel="apple-touch-icon" href="/icons/icon-192.png?v=3" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1C1C21" />
    <!-- interactive-widget=resizes-content: виртуальная клавиатура ужимает
         лейаут-вьюпорт (пересчитывается dvh), поэтому нижние кнопки форм/модалок
         встают над клавиатурой без «перелёта» прокрутки к фоновой подложке. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <title>ELE</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
